<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Praktikum1</title>
</head>
<body>
    <h1>ini judul</h1>
    <h2 id="subjudul">ini subjudul</h2>
    <p>ini paragraph</p>
    <img src="https://course-net.com/wp-content/uploads/2023/03/sta-je-html.jpeg" alt="HTML5 Logo" width="200" height="150">
    <table border="1">
        <tr>
            <th>Nama</th>
            <th>Asal</th>
            <th>Umur</th>
        </tr>
        <tr>
            <td>John Doe</td>
            <td>Bandung</td>
            <td>25</td>
        </tr>
    </table><br>

    <!-- Form for user input -->
    <form action="#">
        <label for="name">Nama:</label>
        <input type="text" id="name" name="name"><br><br>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email"><br><br>

        Hobi<br>
        <input type="checkbox" name="catur" id="catur">
        <label for="catur">Catur</label><br>
        <input type="checkbox" name="badminton" id="badminton">
        <label for="badminton">Badminton</label><br><br>

        <label for="gender">Jenis Kelamin:</label><br>
        <input type="radio" name="gender" id="male" value="male">
        <label for="male">Laki-laki</label><br>
        <input type="radio" name="gender" id="female" value="female">
        <label for="female">Perempuan</label><br><br>

        <input type="submit" value="Submit">
        
    </form>

</body>
</html>
